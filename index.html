async function readFile_old(url,pro_line,pro_end) {
    const response = await fetch(url);
    if (!response.ok) {
      throw new Error(`Failed to fetch file: ${response.statusText}`);
    }
    const text = await response.text();
    const lines = await  text.split(/\r?\n/);
    lines.forEach((line, index) => {
      if(line!="")
      	pro_line(line);
    });
    if(pro_end)
	    pro_end();
}
async function readFile(url, pro_line, pro_end) {
  const response = await fetch(url);

  if (!response.body) {
    throw new Error("ReadableStream not supported in this environment");
  }

  const reader = response.body.getReader();
  const decoder = new TextDecoder();
  let buffer = "";

  while (true) {
    const { done, value } = await reader.read();
    if (done) break;

    buffer += decoder.decode(value, { stream: true });

    // Split into lines
    let lines = buffer.split(/\r?\n/);
    buffer = lines.pop(); // keep incomplete line in buffer

    for (const line of lines) {
      if (line !== "") {
        pro_line(line); // process each line as it arrives
      }
    }
  }

  // Handle any leftover line
  if (buffer) {
    pro_line(buffer);
  }

  if (pro_end) {
    pro_end();
  }
}

function get_clinks(epic)
{

	const self=smj.epics[epic];
	const dlink=smj.links[epic];
	
	var clink={};
	
	clink.partner={};
	clink.descendant={};
	
	if(self.partner && self.partner!="")
	{
		clink.partner[self.partner]=self.partner;
	}
	
	if(dlink)
	Object.entries(dlink).forEach(([key, value]) => {
	  	if(value.partner && value.partner!="")
	  	{
	  		clink.partner[value.partner]=value.partner;
	  	}
	  	if(value.descendant && value.descendant!="")
	  	{
	  		clink.descendant[value.descendant]=value.descendant;
	  	}
	});
	
	
	
	clink.total_partner = Object.keys(clink.partner).length ;
	clink.total_descendant = Object.keys(clink.descendant).length ;
	
	
	return clink;

}

function arrange_descendants(xlink)
{
	var raw={};
	var final={};
	var count=0;
		if(xlink.descendant)
		Object.entries(xlink.descendant).forEach(([key, value]) => {
		  	if(value && value!="")
		  	{
		  		raw[count]=value;
		  		count++
		  	}
		});
	
		for(var i=0;i<count;i++)
		{
			var min=0;
			var min_ep=0;
			var min_key=0;
			var boot=false;
			if(raw)
			Object.entries(raw).forEach(([key, value]) => {
			  	if(value && value!="")
			  	{
			  		var dobj=nbt=smj.epics[value];
			  		var nbt=999;
			  		if(dobj.birth && dobj.birth!="")
			  		{
			  			nbt=dobj.birth;
			  		}
			  		if(!boot)
			  		{
			  			min=nbt;
			  			boot=true;
			  			min_ep=value;
			  			min_key=key;
			  		}
			  		
			  		if(nbt<min)
			  		{
			  			min=nbt;
			  			min_ep=value;
			  			min_key=key;
			  		}
			  	}
			});
			
			if(boot)
			{
				final[i]=min_ep;
				raw[min_key]="";
			}
		}
	
	return final;
	
	
}
